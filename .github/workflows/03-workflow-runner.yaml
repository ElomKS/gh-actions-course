name: 03 - Workflow Runner

on: push

jobs:
    ubuntu-echo:
        runs-on: ubuntu-latest
        steps:
            - name: Show OS
              run: |
                  echo "This job is running on an ubuntu runner."
                  echo "The runner OS is ${{ runner.os }}."
    windows-echo:
       runs-on: windows-latest
       steps:
          - name: Show OS
            run: |
                 echo "This job is running on an ubuntu runner."
                 echo "The runner OS is $RUNNER_OS"
    
